<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Login - SmartAttend</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
    <a href="/login" class="top-bar-login">Admin Login</a>
</div>

<!-- SITE HEADER -->
<header class="site-header">
  <a href="/" class="site-header-logo">
    <img src="https://tse1.mm.bing.net/th/id/OIP._cxocF1ot1j3Ar1J9xLaHgHaDB?pid=Api&h=220&P=0"
         onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/2/2e/ITM_University_Gwalior_logo.png/200px-ITM_University_Gwalior_logo.png';this.onerror=null;"
         alt="ITM University" style="height:60px;">
    <div class="site-header-logo-text">
      <div class="title">ITM University, Gwalior</div>
      <div class="subtitle">Gwalior &middot; MP &middot; India &middot; "Celebrating Dreams"</div>
    </div>
  </a>
  <div class="site-header-right">
    <div class="system-name">Smart Attendance System</div>
    <div class="system-sub">Face Recognition &middot; GPS Verification &middot; WiFi Check</div>
  </div>
</header>

<div class="page" style="max-width:400px; margin:4rem auto;">
  <div class="hero" style="text-align:center; margin-bottom: 2rem;">
    <h1 class="hero-title" style="font-size:2rem;">TEACHER<br><span class="outline">LOGIN</span></h1>
  </div>
  
  {% if error %}
  <div class="status-msg error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="auth-box">
    <div style="margin-bottom: 1rem;">
      <label>Username</label>
      <input type="text" name="username" class="input-text" required placeholder="Ex. jdoe">
    </div>
    <div style="margin-bottom: 1.5rem;">
      <label>Password</label>
      <input type="password" name="password" class="input-text" required>
    </div>
    <button type="submit" class="btn">Login</button>
  </form>
</div>
</body>
</html>
